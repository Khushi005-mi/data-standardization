version: "3.9"

services:

  app:
    build: .
    container_name: fintech_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    container_name: fintech_db
    restart: always
    environment:
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_pass
      POSTGRES_DB: fintech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fintech_cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: